version: '3.8'
services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - STRAVA_CLIENT_ID=${STRAVA_CLIENT_ID}
      - STRAVA_CLIENT_SECRET=${STRAVA_CLIENT_SECRET}
      - DB_PATH=/data/strava.db
      - BASE_URL=${BASE_URL:-http://localhost:5000}
    env_file:
      - ./.secure/credentials.txt
    volumes:
      - ./.secure/strava.db:/data/strava.db
      - ./.secure:/app/.secure:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    environment:
      - STRAVA_CLIENT_ID=${STRAVA_CLIENT_ID}
      - STRAVA_CLIENT_SECRET=${STRAVA_CLIENT_SECRET}
      - DB_PATH=/data/strava.db
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-3600}
    env_file:
      - ./.secure/credentials.txt
    volumes:
      - ./.secure/strava.db:/data/strava.db
      - ./.secure:/app/.secure:ro
    command: ["python", "-m", "src.scheduler"]
