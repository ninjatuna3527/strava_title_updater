name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      SUPERVISOR_PROGRAM: ${{ secrets.SUPERVISOR_PROGRAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.8.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${VPS_PORT:-22} ${VPS_HOST} >> ~/.ssh/known_hosts

      - name: Rsync repository to VPS
        run: |
          rsync -az --delete --exclude '.git' --exclude '.github' --exclude '.env' -e "ssh -p ${VPS_PORT:-22}" ./ ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}

      - name: Run remote deploy commands
        run: |
          ssh -p ${VPS_PORT:-22} ${VPS_USER}@${VPS_HOST} "bash -s" << 'EOF'
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          # ensure venv and install requirements
          if [ ! -d venv ]; then
            python3 -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            deactivate
          else
            . venv/bin/activate
            pip install -r requirements.txt
            deactivate
          fi
          # Restart the service. Prefer Supervisor if SUPERVISOR_PROGRAM is provided,
          # otherwise fall back to systemd for backwards compatibility.
          if [ -n "${SUPERVISOR_PROGRAM:-}" ]; then
            # Generate a Supervisor program config that runs Gunicorn inside the
            # virtualenv located under the deploy path. This creates or overwrites
            # /etc/supervisor/conf.d/${SUPERVISOR_PROGRAM}.conf
            sudo bash -c "cat > /etc/supervisor/conf.d/${SUPERVISOR_PROGRAM}.conf <<SUPCONF
[program:${SUPERVISOR_PROGRAM}]
; change 'user' if you need a different runtime user
directory=${DEPLOY_PATH}
user=${VPS_USER}
command=/bin/bash -lc '${DEPLOY_PATH}/venv/bin/gunicorn -w ${GUNICORN_WORKERS:-3} -b 127.0.0.1:5000 wsgi:app --config ${DEPLOY_PATH}/gunicorn.conf.py'
autostart=true
autorestart=true
stopsignal=TERM
stdout_logfile=/var/log/${SUPERVISOR_PROGRAM}.log
stderr_logfile=/var/log/${SUPERVISOR_PROGRAM}_err.log
environment=PATH="${DEPLOY_PATH}/venv/bin:%(ENV_PATH)s"
priority=999
SUPCONF"

            # Ensure log files exist and are writable
            sudo touch /var/log/${SUPERVISOR_PROGRAM}.log /var/log/${SUPERVISOR_PROGRAM}_err.log || true
            sudo chown ${VPS_USER}:${VPS_USER} /var/log/${SUPERVISOR_PROGRAM}.log /var/log/${SUPERVISOR_PROGRAM}_err.log || true

            sudo supervisorctl reread || true
            sudo supervisorctl update || true
            sudo supervisorctl restart ${SUPERVISOR_PROGRAM} || sudo supervisorctl start ${SUPERVISOR_PROGRAM} || true
          else
            sudo systemctl restart strava.service || sudo systemctl start strava.service
          fi
          EOF
