name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      SUPERVISOR_PROGRAM: ${{ secrets.SUPERVISOR_PROGRAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          pip install ansible

      - name: Create Ansible inventory
        run: |
          mkdir -p deploy/ansible
          cat > deploy/ansible/inventory.ini <<INV
[vps]
${VPS_HOST} ansible_user=${VPS_USER} ansible_port=${VPS_PORT:-22} ansible_python_interpreter=/usr/bin/python3
INV

      - name: Run Ansible playbook
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SUPERVISOR_PROGRAM: ${{ secrets.SUPERVISOR_PROGRAM }}
        run: |
          ansible-playbook deploy/ansible/playbook.yml -i deploy/ansible/inventory.ini \
            --extra-vars "deploy_path=${DEPLOY_PATH} supervisor_program=${SUPERVISOR_PROGRAM} repo_branch=main"
            sudo touch /var/log/${SUPERVISOR_PROGRAM}.log /var/log/${SUPERVISOR_PROGRAM}_err.log || true
            sudo chown ${VPS_USER}:${VPS_USER} /var/log/${SUPERVISOR_PROGRAM}.log /var/log/${SUPERVISOR_PROGRAM}_err.log || true

            sudo supervisorctl reread || true
            sudo supervisorctl update || true
            sudo supervisorctl restart ${SUPERVISOR_PROGRAM} || sudo supervisorctl start ${SUPERVISOR_PROGRAM} || true
          else
            sudo systemctl restart strava.service || sudo systemctl start strava.service
          fi
          EOF
