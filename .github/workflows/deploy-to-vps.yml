name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.8.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${VPS_PORT:-22} ${VPS_HOST} >> ~/.ssh/known_hosts

      - name: Rsync repository to VPS
        run: |
          rsync -az --delete --exclude '.git' --exclude '.github' --exclude '.env' -e "ssh -p ${VPS_PORT:-22}" ./ ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}

      - name: Run remote deploy commands
        run: |
          ssh -p ${VPS_PORT:-22} ${VPS_USER}@${VPS_HOST} "bash -s" << 'EOF'
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          # ensure venv and install requirements
          if [ ! -d venv ]; then
            python3 -m venv venv
            . venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            deactivate
          else
            . venv/bin/activate
            pip install -r requirements.txt
            deactivate
          fi
          # Restart the systemd service (assumes sudo without password or same user)
          sudo systemctl restart strava.service || sudo systemctl start strava.service
          EOF
