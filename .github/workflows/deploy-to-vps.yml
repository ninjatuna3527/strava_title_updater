name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      SUPERVISOR_PROGRAM: ${{ secrets.SUPERVISOR_PROGRAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          pip install ansible

      - name: Create Ansible inventory
        run: |
          mkdir -p deploy/ansible
          cat > deploy/ansible/inventory.ini <<INV
[vps]
${VPS_HOST} ansible_user=${VPS_USER} ansible_port=${VPS_PORT:-22} ansible_python_interpreter=/usr/bin/python3
INV

      - name: Write group_vars/prod.yml from secrets
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          CALLBACK_HOSTNAME: ${{ secrets.CALLBACK_HOSTNAME }}
          BASE_PATH: ${{ secrets.BASE_PATH }}
        run: |
          mkdir -p deploy/ansible/group_vars
          cat > deploy/ansible/group_vars/prod.yml <<EOF
          strava_client_id: "${STRAVA_CLIENT_ID}"
          strava_client_secret: "${STRAVA_CLIENT_SECRET}"
          callback_hostname: "${CALLBACK_HOSTNAME}"
          base_path: "${BASE_PATH:-/stravaapps}"
          EOF

      - name: Run Ansible playbook (prod inventory)
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SUPERVISOR_PROGRAM: ${{ secrets.SUPERVISOR_PROGRAM }}
          BASE_PATH: ${{ secrets.BASE_PATH }}
        run: |
          ansible-playbook deploy/ansible/playbook.yml -i deploy/ansible/inventories/prod/inventory \
            --extra-vars "deploy_path=${DEPLOY_PATH} supervisor_program=${SUPERVISOR_PROGRAM} repo_branch=main base_path=${BASE_PATH:-/stravaapps}"
