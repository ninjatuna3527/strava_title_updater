name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    environment: prod
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      BASE_PATH: ${{ secrets.BASE_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      SUPERVISOR_PROGRAM: ${{ secrets.SUPERVISOR_PROGRAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.VPS_PRIVATE_KEY }}

      - name: Install Ansible
        run: |
          python3 -m pip install --upgrade pip
          pip install ansible

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Run Ansible playbook (prod inventory)
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          SUPERVISOR_PROGRAM: ${{ vars.SUPERVISOR_PROGRAM }}
          SUPERVISOR_SCHEDULER_PROGRAM: ${{ vars.SUPERVISOR_SCHEDULER_PROGRAM }}
          BASE_PATH: ${{ vars.BASE_PATH }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          CALLBACK_HOSTNAME: ${{ vars.CALLBACK_HOSTNAME }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
          DB_PATH: ${{ vars.DB_PATH }}
        run: |
          ansible-playbook deploy/ansible/playbook.yml -i deploy/ansible/inventories/prod/inventory \
            --extra-vars "deploy_path=${DEPLOY_PATH} supervisor_program=${SUPERVISOR_PROGRAM} scheduler_supervisor_program=${SUPERVISOR_SCHEDULER_PROGRAM} repo_branch=main base_path=${BASE_PATH} db_path=${DB_PATH}"
