---
- name: Deploy Strava Title Updater
  hosts: vps
  become: yes
  vars:
    repo_url: "https://github.com/ninjatuna3527/strava_title_updater.git"
    repo_branch: "main"
    deploy_path: "{{ deploy_path }}"
    supervisor_program: "{{ supervisor_program }}"
    venv_path: "{{ deploy_path }}/venv"

  tasks:
    - name: Ensure APT packages are installed
      apt:
        name:
          - git
          - python3-venv
          - python3-pip
          - supervisor
        state: present
        update_cache: yes

    - name: Ensure deploy directory exists
      file:
        path: "{{ deploy_path }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Checkout repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ deploy_path }}"
        version: "{{ repo_branch }}"
        force: yes

    - name: Create virtualenv
      command: python3 -m venv {{ venv_path }}
      args:
        creates: "{{ venv_path }}/bin/activate"

    - name: Install python requirements into venv
      pip:
        requirements: "{{ deploy_path }}/requirements.txt"
        virtualenv: "{{ venv_path }}"
        virtualenv_command: python3 -m venv

    - name: Render Supervisor program config
      template:
        src: supervisor.conf.j2
        dest: "/etc/supervisor/conf.d/{{ supervisor_program }}.conf"
        owner: root
        group: root
        mode: '0644'

    - name: Ensure log files exist
      file:
        path: "/var/log/{{ supervisor_program }}.log"
        state: touch
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'

    - name: Ensure stderr log file exists
      file:
        path: "/var/log/{{ supervisor_program }}_err.log"
        state: touch
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'

    - name: Ensure supervisor service is enabled and running
      service:
        name: supervisor
        state: started
        enabled: yes

    - name: Reload supervisor configurations
      command: supervisorctl reread && supervisorctl update

    - name: Restart the application program
      command: supervisorctl restart {{ supervisor_program }} || supervisorctl start {{ supervisor_program }}
