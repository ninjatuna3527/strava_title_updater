---
- name: Deploy Strava Title Updater
  hosts: vps
  roles:
    - role: strava
      vars:
        repo_url: "https://github.com/ninjatuna3527/strava_title_updater.git"
        repo_branch: "main"
        strava_client_id: "{{ lookup('env', 'STRAVA_CLIENT_ID') }}"
        strava_client_secret: "{{ lookup('env', 'STRAVA_CLIENT_SECRET') }}"
        openai_api_key: "{{ lookup('env', 'OPENAI_API_KEY') }}"
        openai_model: "{{ lookup('env', 'OPENAI_MODEL') | default('gpt-5.2', true) }}"
        base_path: "{{ lookup('env', 'BASE_PATH') }}"
        callback_hostname: "{{ lookup('env', 'CALLBACK_HOSTNAME') }}"
        deploy_ssh_key: "{{ lookup('env', 'DEPLOY_SSH_KEY') }}"
        flask_secret_key: "{{ lookup('env', 'FLASK_SECRET_KEY') }}"
        smtp_sender: "{{ lookup('env', 'SMTP_SENDER') }}"
        smtp_user: "{{ lookup('env', 'SMTP_USER') }}"
        smtp_pass: "{{ lookup('env', 'SMTP_PASS') }}"
        smtp_host: "{{ lookup('env', 'SMTP_HOST') }}"
        smtp_port: "{{ lookup('env', 'SMTP_PORT') }}"
        smtp_security: "{{ lookup('env', 'SMTP_SECURITY') | default('starttls', true) }}"
        admin_email: "{{ lookup('env', 'ADMIN_EMAIL') }}"
        nginx_rate_limit_zone_size: "{{ lookup('env', 'NGINX_RATE_LIMIT_ZONE_SIZE') | default('10m', true) }}"
        nginx_rate_limit_rate: "{{ lookup('env', 'NGINX_RATE_LIMIT_RATE') | default('10r/s', true) }}"
        nginx_rate_limit_burst: "{{ lookup('env', 'NGINX_RATE_LIMIT_BURST') | default('20', true) }}"
        nginx_rate_limit_status: "{{ lookup('env', 'NGINX_RATE_LIMIT_STATUS') | default('429', true) }}"
