---
- name: Ensure APT packages are installed
  apt:
    name:
      - git
      - nginx
      - python3-venv
      - python3-pip
      - supervisor
    state: present
    update_cache: yes
  become: true

- name: Validate SMTP relay configuration
  assert:
    that:
      - smtp_sender | length > 0
      - smtp_pass | length > 0
      - admin_email | length > 0
      - smtp_host | length > 0
      - smtp_port | int >= 1
      - smtp_port | int <= 65535
      - smtp_security in ['starttls', 'ssl', 'unencrypted']
    fail_msg: >-
      SMTP_SENDER, SMTP_PASS, SMTP_HOST, SMTP_PORT, and ADMIN_EMAIL must be
      configured when smtp_enabled is true. SMTP_PORT must be between 1 and
      65535, and SMTP_SECURITY must be starttls, ssl, or unencrypted.
  when: smtp_enabled | bool
  no_log: true

- name: Install sendmail-compatible SMTP relay
  apt:
    name:
      - ca-certificates
      - msmtp
      - msmtp-mta
    state: present
    update_cache: yes
  when: smtp_enabled | bool
  become: true

- name: Ensure SMTP configuration group exists
  group:
    name: msmtp
    state: present
  when: smtp_enabled | bool
  become: true

- name: Allow the application user to use the SMTP relay
  user:
    name: "{{ ansible_user }}"
    groups: msmtp
    append: true
  when: smtp_enabled | bool
  become: true

- name: Render system SMTP relay configuration
  template:
    src: msmtprc.j2
    dest: /etc/msmtprc
    owner: root
    group: msmtp
    mode: '0640'
  when: smtp_enabled | bool
  become: true
  no_log: true

- name: Install SMTP relay password
  copy:
    content: "{{ smtp_pass }}"
    dest: /etc/msmtp-password
    owner: root
    group: msmtp
    mode: '0640'
  when: smtp_enabled | bool
  become: true
  no_log: true

- name: Render sendmail aliases
  template:
    src: aliases.j2
    dest: /etc/aliases
    owner: root
    group: root
    mode: '0644'
  when: smtp_enabled | bool
  become: true

- name: Ensure SMTP log file exists
  file:
    path: /var/log/msmtp.log
    state: touch
    owner: root
    group: msmtp
    mode: '0660'
  when: smtp_enabled | bool
  become: true

- name: Verify the sendmail-compatible relay is available
  command: /usr/sbin/sendmail --version
  changed_when: false
  when: smtp_enabled | bool
  become: true


- name: Ensure deploy directory exists
  file:
    path: "{{ deploy_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Fail if repository requires SSH key but no `deploy_ssh_key` provided
  fail:
    msg: >-
      The configured `repo_url` appears to require SSH access but no
      `deploy_ssh_key` was provided. Set `deploy_ssh_key` in group_vars
      or use an HTTPS-accessible repository URL.
  when: repo_url is defined and (repo_url.startswith('git@') or repo_url.startswith('ssh://')) and (deploy_ssh_key is not defined or deploy_ssh_key | length == 0)

- name: Ensure remote user's .ssh directory exists
  file:
    path: "/home/{{ ansible_user }}/.ssh"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0700'

- name: Install deploy SSH key (optional)
  copy:
    content: "{{ deploy_ssh_key }}"
    dest: "/home/{{ ansible_user }}/.ssh/id_deploy"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
  when: deploy_ssh_key is defined and deploy_ssh_key | length > 0
  no_log: true

- name: Fix repository ownership
  file:
    path: "{{ deploy_path }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    recurse: yes
  become: true

- name: Checkout repository
  git:
    repo: "{{ repo_url }}"
    dest: "{{ deploy_path }}"
    version: "{{ repo_branch }}"
    force: yes
    accept_hostkey: yes
    key_file: "/home/{{ ansible_user }}/.ssh/id_deploy"
  become: true
  become_user: "{{ ansible_user }}"

- name: Render application .env file
  template:
    src: env.j2
    dest: "{{ deploy_path }}/.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
  no_log: true

- name: create db if not exists
  file:
    path: "{{ db_path }}"
    state: touch
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  register: db_file_created


- name: Create virtualenv
  command: python3 -m venv {{ deploy_path }}/venv
  args:
    creates: "{{ deploy_path }}/venv/bin/activate"

- name: Install python requirements into venv
  pip:
    requirements: "{{ deploy_path }}/requirements.txt"
    virtualenv: "{{ deploy_path }}/venv"
    virtualenv_command: python3 -m venv
  become: true
  become_user: "{{ ansible_user }}"

  
- name: init db if required
  command: "{{ deploy_path }}/venv/bin/python -m src.db --init --db-path {{ db_path }}"
  args:
    chdir: "{{ deploy_path }}"
  when: db_file_created.changed

- name: Render Supervisor program config
  template:
    src: supervisor.conf.j2
    dest: "/etc/supervisor/conf.d/{{ supervisor_program }}.conf"
    owner: root
    group: root
    mode: '0644'
  become: true


- name: Render Supervisor scheduler config
  template:
    src: supervisor-scheduler.conf.j2
    dest: "/etc/supervisor/conf.d/{{ scheduler_supervisor_program }}.conf"
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Ensure log files exist
  file:
    path: "/var/log/{{ supervisor_program }}.log"
    state: touch
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
  become: true

- name: Ensure stderr log file exists
  file:
    path: "/var/log/{{ supervisor_program }}_err.log"
    state: touch
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
  become: true

- name: Install certbot if needed
  apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present
  when: enable_tls and nginx_server_name is defined and nginx_server_name != 'localhost'
  become: true

- name: Ensure ACME webroot exists for HTTP-01 validation
  file:
    path: "{{ acme_webroot }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: enable_tls and nginx_server_name is defined and nginx_server_name != 'localhost'
  become: true
- name: Set ssl paths for template
  set_fact:
    ssl_cert_path: >-
      {% if ssl_cert_path|length > 0 %}
      {{ ssl_cert_path }}
      {% elif nginx_server_name is defined and nginx_server_name != 'localhost' %}
      /etc/letsencrypt/live/strava.leeson.zone/fullchain.pem
      {% else %}
      
      {% endif %}
    ssl_key_path: >-
      {% if ssl_key_path|length > 0 %}
      {{ ssl_key_path }}
      {% elif nginx_server_name is defined and nginx_server_name != 'localhost' %}
      /etc/letsencrypt/live/strava.leeson.zone/privkey.pem
      {% else %}
      
      {% endif %}

- name: Fail if TLS requested for localhost without provided certs
  fail:
    msg: >-
      TLS is enabled for localhost but no `ssl_cert_path`/`ssl_key_path` were provided.
      The role does not generate self-signed certificates. For local testing either
      set `enable_tls: false` or provide actual certificate paths via variables.
  when: enable_tls and nginx_server_name == 'localhost' and (ssl_cert_path|length == 0 or ssl_key_path|length == 0)

- name: Render Nginx site config
  template:
    src: nginx.conf.j2
    dest: "/etc/nginx/sites-available/{{ supervisor_program }}.conf"
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Enable Nginx site
  file:
    src: "/etc/nginx/sites-available/{{ supervisor_program }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ supervisor_program }}.conf"
    state: link
  become: true

- name: Test Nginx configuration
  command: nginx -t
  become: true

- name: Reload Nginx
  service:
    name: nginx
    state: reloaded
  become: true

- name: Obtain Let's Encrypt cert (non-interactive)
  command: >-
    certbot --nginx -d strava.leeson.zone --non-interactive --agree-tos -m {{ ssl_contact_email }}
  when: enable_tls and nginx_server_name is defined and nginx_server_name != 'localhost'
  become: true

- name: Ensure supervisor service is enabled and running
  service:
    name: supervisor
    state: started
    enabled: yes
  become: true

- name: Reload supervisor configurations
  command: supervisorctl reread
  become: true

- name: Update supervisor and apply changes
  command: supervisorctl update
  become: true

- name: Try to restart the application program
  command: supervisorctl restart {{ supervisor_program }}
  register: supervisor_restart
  ignore_errors: true
  become: true

- name: Try to restart the application program
  command: supervisorctl restart {{ scheduler_supervisor_program }}
  register: supervisor_restart
  ignore_errors: true
  become: true

- name: Start the application program if restart failed
  command: supervisorctl start {{ supervisor_program }}
  when: supervisor_restart is failed
  become: true
