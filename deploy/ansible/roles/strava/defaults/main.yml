---
# Role defaults for deploying the Strava Title Updater
# The deploy_path uses the remote user's home directory by default.
deploy_path: "/home/{{ ansible_user }}/deployments/hanride"
supervisor_program: "hanride"
scheduler_supervisor_program: "hanride_scheduler"
repo_url: "https://github.com/ninjatuna3527/strava_title_updater.git"
repo_branch: "main"
# Nginx + TLS settings
nginx_server_name: "localhost"
enable_tls: false
# Do NOT generate self-signed certificates automatically.
# If you need to provide custom cert files (not recommended for production),
# set `ssl_cert_path` and `ssl_key_path` to the remote paths of the PEM files.
ssl_cert_path: ""
ssl_key_path: ""
# Email for Let's Encrypt registration when using real domain TLS
ssl_contact_email: "admin@example.com"
# Base path under which the app is served by the reverse proxy.
# Example: "/stravaapps" will make the app available at https://host/stravaapps
base_path: "/hanride"

# ACME webroot for Let's Encrypt HTTP-01 validation
acme_webroot: "/var/www/letsencrypt"

# Per-client nginx request limiting for all application routes
nginx_rate_limit_zone_size: "10m"
nginx_rate_limit_rate: "10r/s"
nginx_rate_limit_burst: 20
nginx_rate_limit_status: 429

# Authenticated SMTP relay exposed through the sendmail-compatible interface
smtp_enabled: false
smtp_host: ""
smtp_port: ""
smtp_security: "starttls"
smtp_sender: ""
smtp_pass: ""
admin_email: ""

# Strava API credentials (provide via inventory/group_vars/host_vars or CI secrets)
strava_client_id: ""
strava_client_secret: ""
openai_api_key: ""
openai_model: "gpt-5.2"
callback_hostname: ""
# Optional private key content (PEM) to write on the remote as /home/{{ ansible_user }}/.ssh/id_deploy
deploy_ssh_key: ""
