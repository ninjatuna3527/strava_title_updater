version: '3.8'
services:
  app:
    restart: unless-stopped
    environment:
      # Example production overrides — adjust to your environment
      - GUNICORN_WORKERS=3
      - GUNICORN_TIMEOUT=60
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  worker:
    restart: unless-stopped
    environment:
      - POLL_INTERVAL_SECONDS=1800
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
