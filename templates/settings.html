<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings - HanRide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ BASE_PATH }}/{{ url_for('static', filename='landing/styles.css') }}" />
  <link rel="icon" href="{{ BASE_PATH }}/{{ url_for('static', filename='landing/assets/favicon.svg') }}" type="image/svg+xml" />
  <style>
    .settings-main {
      width: min(760px, calc(100% - 32px));
      margin: 70px auto;
      position: relative;
      z-index: 1;
    }
    .settings-card {
      padding: clamp(28px, 6vw, 56px);
      border: 1px solid var(--card-border);
      border-radius: 30px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }
    .settings-card h1 {
      font-size: clamp(2.5rem, 8vw, 4.6rem);
      margin-bottom: 14px;
    }
    .intro { color: var(--muted); font-size: 1.08rem; line-height: 1.7; }
    .saved {
      margin: 24px 0;
      padding: 14px 18px;
      border-radius: 14px;
      background: rgba(34, 197, 94, .15);
      color: #86efac;
      font-weight: 700;
    }
    .choices { display: grid; gap: 14px; margin: 34px 0; }
    .choice {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      padding: 22px;
      border: 1px solid var(--card-border);
      border-radius: 18px;
      background: rgba(255, 255, 255, .05);
      cursor: pointer;
    }
    .choice:has(input:checked) {
      border-color: var(--accent);
      background: rgba(252, 76, 2, .12);
    }
    .choice input { margin-top: 5px; accent-color: var(--accent); }
    .choice strong { display: block; margin-bottom: 6px; font-size: 1.08rem; }
    .choice span { color: var(--muted); line-height: 1.5; }
    .warning { display: block; margin-top: 8px; color: var(--accent-2) !important; }
    button { border: 0; cursor: pointer; font: inherit; }
  </style>
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>
  <header class="site-header">
    <a class="brand" href="{{ BASE_PATH }}/">
      <img src="{{ BASE_PATH }}/{{ url_for('static', filename='landing/assets/logo.svg') }}" alt="" />
      <span>HanRide</span>
    </a>
    <a class="nav-cta" href="{{ BASE_PATH }}/activities">Activities</a>
  </header>
  <main class="settings-main">
    <section class="settings-card">
      <p class="eyebrow">Activity settings</p>
      <h1>Hi{% if user.first_name %}, {{ user.first_name }}{% endif %}.</h1>
      <p class="intro">Pick the style HanRide will use for your new Strava activity titles.</p>
      {% if saved %}
        <div class="saved" role="status">Your title preference has been saved.</div>
      {% endif %}
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <div class="choices">
          <label class="choice">
            <input type="radio" name="title_mode" value="chinese" {% if user.title_mode == 'chinese' %}checked{% endif %} />
            <span>
              <strong>Chinese characters</strong>
              <span>Use a short, random string of Chinese characters.</span>
            </span>
          </label>
          <label class="choice">
            <input type="radio" name="title_mode" value="ai" {% if user.title_mode == 'ai' %}checked{% endif %} />
            <span>
              <strong>AI-powered suggestions</strong>
              <span>Generate a playful title from the activity type, duration, and distance.</span>
              {% if not ai_available %}
                <span class="warning">AI is not configured right now, so Chinese characters will be used as a fallback.</span>
              {% endif %}
            </span>
          </label>
        </div>
        <button class="button primary" type="submit">Save settings</button>
      </form>
    </section>
  </main>
</body>
</html>
